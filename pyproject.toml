[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = [".", "backend"]
addopts = "-q"

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["backend/app", "db", "backend/tests"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"backend/app/main.py" = ["E402"]
"db/__main__.py" = ["E402"]
"db/migrations.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["app", "db"]
